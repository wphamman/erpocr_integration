name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pillow: test_fleet_upload_contract builds a real JPEG for the
      # upload_fleet_slip decode-gate (PIL Image.verify at the endpoint).
      - run: pip install pytest requests google-api-python-client google-auth Pillow
      - run: pytest erpocr_integration/tests/ -v

  # ADR-0011: the SPA ships its built dist committed to git (no Node at
  # deploy). This gate rebuilds from frontend/ and fails if the output
  # differs from the committed dist — i.e. someone edited frontend/src
  # without rebuilding. Vite hashes are content-based, so identical source
  # (+ lockfile + Node version) ⇒ identical output.
  dist-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Fail if committed dist drifted from frontend/src
        run: |
          if [ -n "$(git status --porcelain -- erpocr_integration/public/accounts erpocr_integration/www/accounts.html)" ]; then
            echo "::error::Committed SPA dist is stale — rebuild with 'cd frontend && npm run build' and commit the output (ADR-0011)."
            git status --porcelain -- erpocr_integration/public/accounts erpocr_integration/www/accounts.html
            git diff --stat -- erpocr_integration/public/accounts erpocr_integration/www/accounts.html
            exit 1
          fi
          echo "Committed dist matches a fresh build."
